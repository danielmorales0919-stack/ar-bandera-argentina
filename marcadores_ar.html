<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Marcadores AR - Argentina</title>

  <script src="https://cdn.jsdelivr.net/npm/aframe@1.8.0/dist/aframe-master.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #ayuda {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 10;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(0,0,0,.70);
      color: white;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div id="ayuda">
    Apuntá la cámara a cualquiera de los 5 marcadores impresos.
  </div>

  <a-scene embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; trackingMethod: best;">

    <a-assets>
      <img id="bandera" src="assets/bandera.png" crossorigin="anonymous">
      <img id="escudo" src="assets/escudo.png" crossorigin="anonymous">
      <img id="escarapela" src="assets/escarapela.png" crossorigin="anonymous">
      <img id="acta" src="assets/acta.png" crossorigin="anonymous">
      <img id="camiseta" src="assets/camiseta.png" crossorigin="anonymous">
    </a-assets>

    <!-- BANDERA -->
    <a-marker type="pattern" url="assets/pattern-bandera.patt"
      smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
      <a-image src="#bandera" position="0 0.05 0" rotation="-90 0 0" width="1.8" height="1.15" transparent="true"></a-image>
      <a-text value="Bandera Argentina" position="0 -0.85 0.05" rotation="-90 0 0" align="center" color="#111111" width="2"></a-text>
    </a-marker>

    <!-- ESCUDO -->
    <a-marker type="pattern" url="assets/pattern-escudo.patt"
      smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
      <a-image src="#escudo" position="0 0.05 0" rotation="-90 0 0" width="1.25" height="1.25" transparent="true"></a-image>
      <a-text value="Escudo Argentino" position="0 -0.85 0.05" rotation="-90 0 0" align="center" color="#111111" width="2"></a-text>
    </a-marker>

    <!-- ESCARAPELA -->
    <a-marker type="pattern" url="assets/pattern-escarapela.patt"
      smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
      <a-image src="#escarapela" position="0 0.05 0" rotation="-90 0 0" width="1.25" height="1.25" transparent="true"></a-image>
      <a-text value="Escarapela Argentina" position="0 -0.85 0.05" rotation="-90 0 0" align="center" color="#111111" width="2"></a-text>
    </a-marker>

    <!-- ACTA -->
    <a-marker type="pattern" url="assets/pattern-acta.patt"
      smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
      <a-image src="#acta" position="0 0.08 0" rotation="-90 0 0" width="1.05" height="1.45" transparent="true"></a-image>
      <a-text value="Acta de la Independencia" position="0 -0.95 0.05" rotation="-90 0 0" align="center" color="#111111" width="2"></a-text>
    </a-marker>

    <!-- CAMISETA -->
    <a-marker type="pattern" url="assets/pattern-camiseta.patt"
      smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
      <a-image src="#camiseta" position="0 0.08 0" rotation="-90 0 0" width="1.15" height="1.35" transparent="true"></a-image>
      <a-text value="Camiseta Argentina" position="0 -0.95 0.05" rotation="-90 0 0" align="center" color="#111111" width="2"></a-text>
    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
